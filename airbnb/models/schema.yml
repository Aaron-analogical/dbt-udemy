models:
  - name: dim_listings_cleansed
    description: This table contains the cleansed listings data. It is a dimension table that contains the listings data. It is used to join with the fact tables.
    data_tests:
      - minimum_row_count:
          arguments:
            min_row_count: 1000
          severity: warn
    columns:
      - name: listing_id
        description: The listing's id. References the listing table.
        data_tests:
          - unique
          - not_null

      - name: host_id
        description: The hosts's id. References the host table.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hosts_cleansed')
                field: host_id

      - name: room_type
        description: Type of the apartment / room
        data_tests:
          - accepted_values:
              values: ['Entire home/apt',
                       'Private room',
                       'Shared room',
                       'Hotel room']

      - name: minimum_nights
        description: '{{ doc("dim_listing_cleansed__minimum_nights") }}'
        data_tests:
          - positive_values

  - name: dim_hosts_cleansed
    description: This table contains the cleansed hosts data. It is a dimension table that contains the hosts data. It is used to join with the fact tables.
    config:
      contract:
        enforced: true
    columns:

      - name: host_id
        data_tests:
          - unique
          - not_null
        data_type: integer

      - name: host_name
        data_tests:
          - not_null
        data_type: string
        description: The name of the host. Make sure there is no null value.

      - name: is_superhost
        data_type: string
        data_tests:
          - accepted_values:
              values: ['t', 'f']

      - name: updated_at
        data_type: timestamp
        
      - name: created_at
        data_type: timestamp

  - name: fct_reviews
    columns:
      - name: listing_id
        description: The listing id. References the listing table.
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_listings_cleansed')
                field: listing_id

      - name: reviewer_name
        description: The name of the reviewer.
        data_tests:
          - not_null

      - name: review_sentiment
        description: The sentiment of the review. Can be either positive, negative or neutral.
        data_tests:
          - accepted_values:
              values: ['positive', 'negative', 'neutral']

  - name: dim_listings_w_hosts
    tests: 
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          compare_model: "{{ source('airbnb', 'listings') }}"
    
    columns:
      - name: price
        tests:
          - dbt_expectations.expect_column_quantile_values_to_be_between:
              quantile: .99
              min_value: 50
              max_value: 500
          - dbt_expectations.expect_column_max_to_be_between:
              max_value: 5000
              config:
                severity: warn
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: number