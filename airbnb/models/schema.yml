models:
  - name: dim_listings_cleansed
    data_tests:
      - minimum_row_count:
          arguments:
            min_row_count: 1000
          severity: warn
    columns:
      - name: listing_id
        data_tests:
          - unique
          - not_null

      - name: host_id
        description: The hosts's id. References the host table.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hosts_cleansed')
                field: host_id

      - name: room_type
        description: Type of the apartment / room
        data_tests:
          - accepted_values:
              values: ['Entire home/apt',
                       'Private room',
                       'Shared room',
                       'Hotel room']

      - name: minimum_nights
        data_tests:
          - positive_values

  - name: dim_hosts_cleansed
    config:
      contract:
        enforced: true
    columns:

      - name: host_id
        data_tests:
          - unique
          - not_null
        data_type: integer

      - name: host_name
        data_tests:
          - not_null
        data_type: string
        description: The name of the host. Make sure there is no null value.

      - name: is_superhost
        data_type: string
        data_tests:
          - accepted_values:
              values: ['t', 'f']

      - name: updated_at
        data_type: timestamp
        
      - name: created_at
        data_type: timestamp

  - name: fct_reviews
    columns:
      - name: listing_id
        description: The listing id. References the listing table.
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_listings_cleansed')
                field: listing_id

      - name: reviewer_name
        description: The name of the reviewer.
        data_tests:
          - not_null

      - name: review_sentiment
        description: The sentiment of the review. Can be either positive, negative or neutral.
        data_tests:
          - accepted_values:
              values: ['positive', 'negative', 'neutral']
